server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
      # ========== 新增Druid连接池优化配置 ==========
      initial-size: 5                # 初始化连接数（大厂常规值）
      min-idle: 5                    # 最小空闲连接数
      max-active: 20                 # 最大活跃连接数
      max-wait: 60000                # 获取连接的最大等待时间（60秒）
      time-between-eviction-runs-millis: 60000  # 空闲连接检测间隔（60秒）
      min-evictable-idle-time-millis: 300000    # 连接最小空闲时间（5分钟，超过则回收）
      validation-query: SELECT 1     # 验证连接有效性的SQL（MySQL通用）
      test-while-idle: true          # 空闲时检测连接（核心：解决空闲连接被MySQL断开问题）
      test-on-borrow: false          # 获取连接时不检测（提升性能）
      test-on-return: false          # 归还连接时不检测（提升性能）
      pool-prepared-statements: true # 开启PSCache（提升SQL执行效率）
      max-pool-prepared-statement-per-connection-size: 20 # PSCache大小
      filters: stat,wall             # 配置监控+防SQL注入过滤器（去掉log4j避免依赖冲突）
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000 # 慢SQL阈值（5秒）
  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    password: ${sky.redis.password}
    # ========== 新增Redis连接池配置（可选，提升Redis性能） ==========
    lettuce:
      pool:
        max-active: 8   # 最大连接数
        max-idle: 8     # 最大空闲连接
        min-idle: 0     # 最小空闲连接
        max-wait: -1ms  # 连接等待时间（-1表示无限制）

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    # 设置用户jwt签名加密时使用的秘钥
    user-secret-key: itcast
    # 设置用户jwt过期时间
    user-ttl: 7200000
    # 登录用户jwt签名加密时使用的秘钥
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}
  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}
#    mchid: ${sky.wechat.mchid}
#    mchSerialNo: ${sky.wechat.mchSerialNo}
#    privateKeyFilePath: ${sky.wechat.privateKeyFilePath}
#    apiV3Key: ${sky.wechat.apiV3Key}
#    weChatPayCertFilePath: ${sky.wechat.weChatPayCertFilePath}
#    notifyUrl: ${sky.wechat.notifyUrl}
#    refundNotifyUrl: ${sky.wechat.refundNotifyUrl}

